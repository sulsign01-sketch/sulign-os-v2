<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Apontamento de Produção · SulSign OS v2</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#1A1C22;--ink2:#2A2D36;--paper:#F5F4F0;--panel:#FFFFFF;
  --accent:#FF5A1F;--accent-soft:#FFEDE4;
  --ok:#1E9E5A;--ok-soft:#E3F5EB;--warn:#D97706;--warn-soft:#FCF0DC;
  --danger:#D23B2F;--danger-soft:#FBE7E4;--blue:#2563EB;
  --line:#E4E2DC;--mut:#6B6E76;
  --font-d:"Archivo",system-ui,sans-serif;--font-b:"Inter",system-ui,sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:var(--font-b);background:var(--paper);color:var(--ink);font-size:14px;line-height:1.5;padding-bottom:74px}
button{font-family:inherit;cursor:pointer}
input,select,textarea{font-family:inherit;font-size:16px}
.hd{background:var(--ink);color:#fff;padding:16px 18px;position:sticky;top:0;z-index:10}
.hd .brand{font-family:var(--font-d);font-weight:800;font-size:13px;letter-spacing:.4px;color:#8B8E97}
.hd .brand span{color:var(--accent)}
.hd h1{font-family:var(--font-d);font-weight:800;font-size:20px;margin-top:3px}
.hd .badge{display:inline-block;background:var(--accent);color:#fff;font-size:10px;font-weight:800;letter-spacing:1px;text-transform:uppercase;padding:3px 10px;border-radius:20px;margin-top:7px}
.hd .job{font-size:12px;color:#8B8E97;margin-top:6px}
.wrap{max-width:560px;margin:0 auto;padding:14px}
.sec{background:var(--panel);border:1px solid var(--line);border-radius:12px;margin-bottom:14px;overflow:hidden}
.sec-hd{display:flex;align-items:center;justify-content:space-between;padding:13px 15px;border-bottom:1px solid var(--line)}
.sec-title{font-family:var(--font-d);font-weight:700;font-size:14px}
.sec-body{padding:14px 15px}
.btn-sec{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:6px 14px;font-size:12px;font-weight:700}
.empty{color:var(--mut);font-size:13px;text-align:center;padding:22px 10px;line-height:1.6}

/* checklist */
.ck-item{display:flex;gap:12px;align-items:flex-start;padding:11px 0;border-bottom:1px solid #EFEEE9}
.ck-item:last-child{border-bottom:none}
.ck-box{width:30px;height:30px;border-radius:8px;border:2px solid var(--line);display:flex;align-items:center;justify-content:center;flex-shrink:0;background:#fff;font-size:15px;color:transparent}
.ck-box.done{background:var(--ok);border-color:var(--ok);color:#fff}
.ck-box.parcial{background:var(--warn-soft);border-color:var(--warn);color:var(--warn)}
.ck-info{flex:1;min-width:0}
.ck-nome{font-weight:600;font-size:14px}
.ck-dim{font-size:12px;color:var(--mut);margin-top:1px}
.ck-status select{width:100%;margin-top:7px;border:1px solid var(--line);border-radius:8px;padding:7px 10px;background:#fff}

/* form */
.fl{margin-bottom:11px}
.fl label{display:block;font-size:10.5px;letter-spacing:.6px;text-transform:uppercase;color:var(--mut);font-weight:600;margin-bottom:4px}
.fi{width:100%;border:1px solid var(--line);border-radius:9px;padding:11px 12px;background:#fff}
.fi:focus{outline:none;border-color:var(--accent)}
textarea.fi{resize:vertical;min-height:56px;font-size:14px}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.chk-line{display:flex;align-items:center;gap:9px;font-size:13px;margin:10px 0}
.chk-line input{width:20px;height:20px}
.btn-big{width:100%;background:var(--accent);color:#fff;border:none;border-radius:10px;padding:14px;font-size:15px;font-weight:700;margin-top:6px}
.btn-big:disabled{opacity:.5}
.total-box{background:var(--accent-soft);border-radius:10px;padding:12px 14px;display:flex;justify-content:space-between;align-items:center;margin:10px 0}
.total-box .lb{font-size:11px;color:var(--accent);font-weight:700;letter-spacing:.6px;text-transform:uppercase}
.total-box .vl{font-family:var(--font-d);font-weight:800;font-size:22px;color:var(--accent)}

/* autocomplete */
.ac-wrap{position:relative}
.ac-drop{position:absolute;left:0;right:0;top:100%;background:#fff;border:1px solid var(--line);border-radius:0 0 9px 9px;max-height:220px;overflow-y:auto;z-index:30;box-shadow:0 6px 18px rgba(0,0,0,.12)}
.ac-item{padding:10px 12px;border-bottom:1px solid #EFEEE9;font-size:13px}
.ac-item:active{background:var(--accent-soft)}
.ac-item b{display:block}
.ac-item small{color:var(--mut)}

/* lançamentos list */
.lc{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #EFEEE9}
.lc:last-child{border-bottom:none}
.lc-info{flex:1;min-width:0}
.lc-nome{font-weight:600;font-size:13.5px}
.lc-meta{font-size:11.5px;color:var(--mut)}
.lc-val{font-family:var(--font-d);font-weight:800;font-size:14px;white-space:nowrap}
.tag{display:inline-block;font-size:10px;font-weight:700;padding:1px 8px;border-radius:20px}
.t-mat{background:#E5EDFC;color:var(--blue)}
.t-mo{background:var(--accent-soft);color:var(--accent)}
.t-out{background:#EFEEE9;color:var(--mut)}

/* resumo */
.kgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.kbox{background:var(--paper);border-radius:10px;padding:12px;border-left:3px solid var(--ok)}
.kbox.w{border-left-color:var(--warn)}.kbox.d{border-left-color:var(--danger)}.kbox.a{border-left-color:var(--accent)}
.kbox .kl{font-size:9.5px;color:var(--mut);letter-spacing:.6px;text-transform:uppercase;margin-bottom:3px}
.kbox .kv{font-family:var(--font-d);font-weight:800;font-size:19px}

/* foto */
.foto-area{border:2px dashed var(--line);border-radius:10px;padding:16px;text-align:center;color:var(--mut);font-size:12.5px}
.foto-area img{max-width:100%;max-height:180px;border-radius:8px;margin-top:8px}

/* bottom nav */
.btm{position:fixed;bottom:0;left:0;right:0;background:var(--panel);border-top:1px solid var(--line);display:none;z-index:40;max-width:560px;margin:0 auto}
.btm button{flex:1;background:none;border:none;padding:9px 4px 8px;color:var(--mut);font-size:11px;font-weight:600;display:flex;flex-direction:column;align-items:center;gap:2px}
.btm button .i{font-size:19px}
.btm button.on{color:var(--accent)}
.btm button.on .i{transform:translateY(-1px)}

/* status msg */
.st-msg{font-size:12.5px;margin-top:9px;text-align:center;min-height:16px}
.st-msg.ok{color:var(--ok)}.st-msg.err{color:var(--danger)}.st-msg.info{color:var(--mut)}

/* loader / error */
.center{min-height:70vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:24px}
.center .ic{font-size:44px;margin-bottom:12px}
.center h2{font-family:var(--font-d);font-weight:800;font-size:18px;margin-bottom:6px}
.center p{color:var(--mut);font-size:13px}
</style>
</head>
<body>

<div class="hd">
  <div class="brand">SulSign <span>OS</span> · v2</div>
  <h1 id="hd-disc-nome">Apontamento</h1>
  <span class="badge" id="hd-disc-badge">—</span>
  <div class="job" id="hd-job"></div>
</div>

<div id="root">
  <div class="center"><div class="ic">⏳</div><h2>Carregando<span id="dots"></span></h2><p>Buscando o apontamento…</p></div>
</div>

<div class="btm" id="btm-nav">
  <button data-v="checklist" class="on" id="btn-v-ck"><span class="i">☑</span>Escopo</button>
  <button data-v="insumos" id="btn-v-ins"><span class="i">🧱</span>Insumos</button>
  <button data-v="resumo" id="btn-v-res"><span class="i">📊</span>Resumo</button>
</div>

<script>
/* ═══════════ CONFIG ═══════════ */
var SUPA_URL='https://obeamqkcuytctfczhook.supabase.co';
var SUPA_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9iZWFtcWtjdXl0Y3RmY3pob29rIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwMDIxOTQsImV4cCI6MjA4ODU3ODE5NH0.zk88W0HUIYkp8toTsJIXFHf6IGPRPs4hKz8kT3I5QVY';
var H={'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY,'Content-Type':'application/json'};

var PARAMS=new URLSearchParams(window.location.search);
var TOKEN=PARAMS.get('token');
var APOINT=null, ORC=null, INSUMOS_BASE=[], LANCS=[], CHECKLIST=[];
var VIEW='checklist', fotoB64=null, insSelId=null;

var dotsI=0;
var dotsTimer=setInterval(function(){dotsI++;var d=document.getElementById('dots');if(d)d.textContent='.'.repeat((dotsI%4));},400);

/* ═══════════ UTILS ═══════════ */
function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function fmt(v){return 'R$ '+(parseFloat(v)||0).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});}
function showError(ic,t,p){clearInterval(dotsTimer);document.getElementById('root').innerHTML='<div class="center"><div class="ic">'+ic+'</div><h2>'+esc(t)+'</h2><p>'+esc(p||'')+'</p></div>';}
function showSt(id,msg,tp){var e=document.getElementById(id);if(e){e.textContent=msg;e.className='st-msg '+(tp||'');}}

/* ═══════════ INIT ═══════════ */
async function init(){
  if(!TOKEN){showError('🔒','Link inválido ou expirado.','Solicite um novo link ao responsável.');return;}
  try{
    var r=await fetch(SUPA_URL+'/rest/v1/apontamentos_producao?token=eq.'+encodeURIComponent(TOKEN)+'&select=*',{headers:H});
    var data=await r.json();
    if(!data||!data.length){showError('❌','Apontamento não encontrado.','Confira o link com o responsável.');return;}
    APOINT=data[0];
    if(APOINT.status==='encerrado'){showError('🔒','Apontamento encerrado.','Este link foi desativado pelo responsável.');return;}
    clearInterval(dotsTimer);

    document.getElementById('hd-disc-nome').textContent=APOINT.disciplina||'Apontamento';
    document.getElementById('hd-disc-badge').textContent=APOINT.disciplina_codigo||APOINT.disciplina||'—';
    document.getElementById('hd-job').textContent=(APOINT.job_numero||'')+(APOINT.job_nome?' · '+APOINT.job_nome:'');

    // grupos do orçamento filtrados pela disciplina
    try{
      var ro=await fetch(SUPA_URL+'/rest/v1/orcamentos?numero=eq.'+encodeURIComponent(APOINT.job_numero)+'&select=grupos,cliente,projeto',{headers:H});
      var orcs=await ro.json();
      if(orcs&&orcs.length){
        ORC=orcs[0];
        var cod=APOINT.disciplina_codigo;
        CHECKLIST=(ORC.grupos||[]).filter(function(g){return (g.setores||[]).indexOf(cod)>=0;})
          .map(function(g){return {nome:g.nome||'',dim:g.dim||'',status:'nao_iniciado'};});
      }
    }catch(e){}

    // base de insumos
    try{
      var ri=await fetch(SUPA_URL+'/rest/v1/base_insumos?select=*&order=nome.asc&limit=500',{headers:H});
      var idata=await ri.json();
      INSUMOS_BASE=Array.isArray(idata)?idata:[];
    }catch(e){INSUMOS_BASE=[];}

    await carregarLancs();

    // restaura checklist salvo (casa por nome)
    if(APOINT.checklist&&APOINT.checklist.length){
      var byNome={};
      APOINT.checklist.forEach(function(ck){if(ck.nome)byNome[ck.nome]=ck.status||'nao_iniciado';});
      CHECKLIST.forEach(function(it){if(byNome.hasOwnProperty(it.nome))it.status=byNome[it.nome];});
    }

    document.getElementById('btm-nav').style.display='flex';
    render();
  }catch(e){showError('⚠','Erro ao carregar',e.message);}
}
async function carregarLancs(){
  try{
    var r=await fetch(SUPA_URL+'/rest/v1/lancamentos_apontamento?apontamento_id=eq.'+APOINT.id+'&order=criado_em.desc',{headers:H});
    var d=await r.json();LANCS=Array.isArray(d)?d:[];
  }catch(e){LANCS=[];}
}

/* ═══════════ NAV ═══════════ */
function setView(v){
  VIEW=v;
  ['ck','ins','res'].forEach(function(x){document.getElementById('btn-v-'+x).classList.remove('on');});
  document.getElementById('btn-v-'+(v==='checklist'?'ck':v==='insumos'?'ins':'res')).classList.add('on');
  render();window.scrollTo(0,0);
}
function render(){
  var r=document.getElementById('root');
  if(VIEW==='checklist')r.innerHTML=vChecklist();
  else if(VIEW==='insumos')r.innerHTML=vInsumos();
  else r.innerHTML=vResumo();
}

/* ═══════════ VIEW: CHECKLIST ═══════════ */
function vChecklist(){
  var h='<div class="wrap"><div class="sec"><div class="sec-hd"><span class="sec-title">☑ Checklist de escopo</span><button class="btn-sec" data-action="save-ck">Salvar</button></div>';
  if(!CHECKLIST.length){
    h+='<div class="sec-body"><div class="empty">Nenhum grupo desta disciplina no orçamento.<br>Confira se os grupos estão marcados com o setor certo no ORC Manager.</div></div>';
  }else{
    h+='<div class="sec-body">';
    CHECKLIST.forEach(function(ck,i){
      var done=ck.status==='concluido', parc=ck.status==='andamento';
      h+='<div class="ck-item"><div class="ck-box '+(done?'done':parc?'parcial':'')+'">'+(done?'✓':parc?'~':'')+'</div>';
      h+='<div class="ck-info"><div class="ck-nome">'+esc(ck.nome)+'</div>'+(ck.dim?'<div class="ck-dim">'+esc(ck.dim)+'</div>':'');
      h+='<div class="ck-status"><select data-ck="'+i+'">';
      [['nao_iniciado','⬜ Não iniciado'],['andamento','🔄 Em andamento'],['concluido','✅ Concluído'],['impedido','🚫 Impedido']].forEach(function(o){
        h+='<option value="'+o[0]+'"'+(ck.status===o[0]?' selected':'')+'>'+o[1]+'</option>';
      });
      h+='</select></div></div></div>';
    });
    h+='</div>';
  }
  h+='</div>';
  h+='<div class="sec"><div class="sec-hd"><span class="sec-title">📝 Observação geral</span></div><div class="sec-body">';
  h+='<textarea class="fi" id="obs-geral" placeholder="Anote impedimentos, pendências, algo que o escritório precise saber…">'+esc(APOINT.observacao_geral||'')+'</textarea>';
  h+='<button class="btn-big" data-action="save-obs" style="margin-top:10px">Salvar observação</button>';
  h+='<div class="st-msg" id="st-obs"></div></div></div>';
  h+='</div>';
  return h;
}

/* ═══════════ VIEW: INSUMOS ═══════════ */
var CATS=['Material','Insumo','Mão de Obra','Alimentação','Comunicação Visual','Ferramenta','Transporte','Outros'];
var UNIS=['un','m²','m','ml','kg','L','pç','cx','diária','h'];
function vInsumos(){
  var h='<div class="wrap"><div class="sec"><div class="sec-hd"><span class="sec-title">🧱 Lançar insumo / material</span></div><div class="sec-body">';
  h+='<div class="fl ac-wrap"><label>Insumo / material</label><input class="fi" id="ins-busca" placeholder="Digite para buscar ou cadastrar" autocomplete="off"><div id="ins-drop"></div></div>';
  h+='<div class="row3"><div class="fl"><label>Qtd</label><input class="fi" id="ins-qtd" inputmode="decimal" value="1"></div>';
  h+='<div class="fl"><label>Un</label><select class="fi" id="ins-un">';
  UNIS.forEach(function(u){h+='<option>'+u+'</option>';});
  h+='</select></div>';
  h+='<div class="fl"><label>Custo unit.</label><input class="fi" id="ins-custo" inputmode="decimal" value="0"></div></div>';
  h+='<div class="row2"><div class="fl"><label>Categoria</label><select class="fi" id="ins-cat">';
  CATS.forEach(function(c){h+='<option>'+c+'</option>';});
  h+='</select></div>';
  h+='<div class="fl"><label>Fornecedor</label><input class="fi" id="ins-forn"></div></div>';

  // MO / PDVEX condicional
  h+='<div id="ins-mo-wrap" style="display:none"><div class="row2">';
  h+='<div class="fl"><label>Tipo de MO</label><select class="fi" id="ins-tipo-mo"><option value="free">Free (diarista)</option><option value="fixo">Fixo (equipe)</option><option value="terceiro">Terceiro</option></select></div>';
  h+='<div class="fl"><label>Local</label><select class="fi" id="ins-local-mo"><option value="galpao">Galpão</option><option value="obra">Obra/Montagem</option><option value="externo">Externo</option></select></div></div>';
  h+='<div class="fl" id="ins-he-wrap" style="display:none"><label>Horas extras</label><input class="fi" id="ins-he" inputmode="decimal" value="0"></div></div>';

  h+='<div class="total-box"><span class="lb">Total</span><span class="vl" id="ins-total">R$ 0,00</span></div>';
  h+='<div class="chk-line"><input type="checkbox" id="ins-nota" checked><label style="margin:0;text-transform:none;letter-spacing:0;font-size:13px;color:var(--ink)">Tem nota fiscal</label></div>';
  h+='<div class="fl"><label>Comprovante (foto)</label><div class="foto-area" id="ins-foto-area" data-action="foto-pick">Toque para fotografar ou escolher</div><input type="file" id="ins-file" accept="image/*" capture="environment" style="display:none"></div>';
  h+='<div class="fl"><label>Observação</label><input class="fi" id="ins-obs"></div>';
  h+='<button class="btn-big" data-action="save-ins" id="btn-ins">＋ Lançar</button>';
  h+='<div class="st-msg" id="st-ins"></div>';
  h+='</div></div>';

  // lançamentos já feitos
  h+='<div class="sec"><div class="sec-hd"><span class="sec-title">Lançados nesta disciplina</span><span style="font-size:12px;color:var(--mut)">'+LANCS.length+'</span></div><div class="sec-body">';
  if(!LANCS.length)h+='<div class="empty" style="padding:14px">Nada lançado ainda.</div>';
  else{
    LANCS.forEach(function(l){
      var tc=l.categoria==='Mão de Obra'?'t-mo':(l.categoria==='Material'||l.categoria==='Insumo'?'t-mat':'t-out');
      h+='<div class="lc"><div class="lc-info"><div class="lc-nome">'+esc(l.insumo_nome||l.descricao||'—')+'</div>';
      h+='<div class="lc-meta"><span class="tag '+tc+'">'+esc(l.categoria||'')+'</span> '+esc(l.quantidade||'')+' '+esc(l.unidade||'')+' × '+fmt(l.custo_unit)+'</div></div>';
      h+='<div class="lc-val">'+fmt(l.custo_total)+'</div></div>';
    });
  }
  h+='</div></div></div>';
  return h;
}
function calcTotal(){
  var qtd=parseFloat((document.getElementById('ins-qtd')||{}).value)||1;
  var cu=parseFloat((document.getElementById('ins-custo')||{}).value)||0;
  var he=0;
  var cat=document.getElementById('ins-cat');
  var heEl=document.getElementById('ins-he');
  if(cat&&cat.value==='Mão de Obra'&&heEl)he=parseFloat(heEl.value)||0;
  var t=document.getElementById('ins-total');
  if(t)t.textContent=fmt(qtd*cu+he*cu/8);
}
function toggleMo(){
  var cat=document.getElementById('ins-cat');
  var wrap=document.getElementById('ins-mo-wrap');
  var heW=document.getElementById('ins-he-wrap');
  var tipo=document.getElementById('ins-tipo-mo');
  var isMo=cat&&cat.value==='Mão de Obra';
  if(wrap)wrap.style.display=isMo?'block':'none';
  if(heW)heW.style.display=(isMo&&tipo&&tipo.value==='fixo')?'block':'none';
  calcTotal();
}
function buscarInsumo(q){
  var drop=document.getElementById('ins-drop');
  if(!drop)return;
  insSelId=null;
  q=(q||'').trim().toLowerCase();
  if(q.length<2){drop.innerHTML='';return;}
  var res=INSUMOS_BASE.filter(function(x){return String(x.nome||'').toLowerCase().indexOf(q)>=0;}).slice(0,8);
  if(!res.length){drop.innerHTML='';return;}
  var h='<div class="ac-drop">';
  res.forEach(function(x,i){
    h+='<div class="ac-item" data-ins="'+i+'"><b>'+esc(x.nome)+'</b><small>'+(x.preco_unit?fmt(x.preco_unit)+'/'+esc(x.unidade||'un'):'sem preço')+(x.categoria?' · '+esc(x.categoria):'')+'</small></div>';
  });
  h+='</div>';
  drop.innerHTML=h;
  drop._res=res;
}
function selecionarInsumo(x){
  insSelId=x.id||null;
  document.getElementById('ins-busca').value=x.nome||'';
  if(x.preco_unit)document.getElementById('ins-custo').value=x.preco_unit;
  if(x.unidade){var u=document.getElementById('ins-un');for(var i=0;i<u.options.length;i++){if(u.options[i].value===x.unidade){u.selectedIndex=i;break;}}}
  if(x.categoria){var c=document.getElementById('ins-cat');for(var i=0;i<c.options.length;i++){if(c.options[i].value===x.categoria){c.selectedIndex=i;break;}}}
  document.getElementById('ins-drop').innerHTML='';
  toggleMo();calcTotal();
}
function normNome(s){return String(s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/\s+/g,' ').trim();}
function insParecido(nome){
  var n=normNome(nome);
  for(var i=0;i<INSUMOS_BASE.length;i++){if(normNome(INSUMOS_BASE[i].nome)===n)return INSUMOS_BASE[i];}
  return null;
}
async function salvarInsumo(){
  var btn=document.getElementById('btn-ins');
  var nome=(document.getElementById('ins-busca')||{}).value.trim();
  if(!nome){showSt('st-ins','✗ Informe o insumo/material.','err');return;}
  var qtd=parseFloat((document.getElementById('ins-qtd')||{}).value)||1;
  var un=(document.getElementById('ins-un')||{}).value;
  var cu=parseFloat((document.getElementById('ins-custo')||{}).value)||0;
  var cat=(document.getElementById('ins-cat')||{}).value;
  var forn=(document.getElementById('ins-forn')||{}).value.trim();
  var obs=(document.getElementById('ins-obs')||{}).value.trim();
  var nota=(document.getElementById('ins-nota')||{}).checked;
  var he=(cat==='Mão de Obra')?(parseFloat((document.getElementById('ins-he')||{}).value)||0):0;

  // dedup se não veio do autocomplete
  if(!insSelId){
    var par=insParecido(nome);
    if(par){
      if(confirm('Já existe "'+par.nome+'" na base.\n\n[OK] usar o existente · [Cancelar] manter como novo')){
        selecionarInsumo(par);nome=par.nome;if(par.preco_unit)cu=par.preco_unit;
      }
    }
  }
  btn.disabled=true;showSt('st-ins','Salvando…','info');
  var total=qtd*cu+he*cu/8;
  try{
    var payload={
      apontamento_id:APOINT.id,
      insumo_nome:nome,descricao:nome,insumo_base_id:insSelId||null,
      quantidade:qtd,unidade:un,custo_unit:cu,custo_total:total,
      categoria:cat,fornecedor:forn,observacao:obs,tem_nota:nota,
      tipo_mo:(cat==='Mão de Obra')?(document.getElementById('ins-tipo-mo')||{}).value:null,
      local_mo:(cat==='Mão de Obra')?(document.getElementById('ins-local-mo')||{}).value:null,
      horas_extras:(cat==='Mão de Obra')?(he||null):null,
      comprovante:fotoB64||null,
      data:new Date().toISOString().split('T')[0]
    };
    var r=await fetch(SUPA_URL+'/rest/v1/lancamentos_apontamento',{method:'POST',headers:Object.assign({},H,{'Prefer':'return=minimal'}),body:JSON.stringify(payload)});
    if(!r.ok)throw new Error('HTTP '+r.status+' — '+await r.text());
    // cadastra na base se for novo
    if(!insSelId&&!insParecido(nome)){
      try{await fetch(SUPA_URL+'/rest/v1/base_insumos',{method:'POST',headers:Object.assign({},H,{'Prefer':'return=minimal'}),body:JSON.stringify({nome:nome,unidade:un,preco_unit:cu,categoria:cat})});}catch(e){}
    }
    fotoB64=null;insSelId=null;
    await carregarLancs();
    showSt('st-ins','✓ Lançado!','ok');
    render();
  }catch(e){showSt('st-ins','✗ '+e.message,'err');btn.disabled=false;}
}
function lerFoto(file){
  if(!file||file.type.indexOf('image')!==0)return;
  var rd=new FileReader();
  rd.onload=function(ev){
    fotoB64=ev.target.result;
    var a=document.getElementById('ins-foto-area');
    if(a)a.innerHTML='✓ Anexado<br><img src="'+fotoB64+'">';
  };
  rd.readAsDataURL(file);
}

/* ═══════════ VIEW: RESUMO ═══════════ */
function vResumo(){
  var totalCusto=LANCS.reduce(function(a,l){return a+(parseFloat(l.custo_total)||0);},0);
  var done=CHECKLIST.filter(function(c){return c.status==='concluido';}).length;
  var parc=CHECKLIST.filter(function(c){return c.status==='andamento';}).length;
  var imp=CHECKLIST.filter(function(c){return c.status==='impedido';}).length;
  var porCat={};
  LANCS.forEach(function(l){var c=l.categoria||'Outros';if(!porCat[c])porCat[c]={t:0,n:0};porCat[c].t+=parseFloat(l.custo_total)||0;porCat[c].n++;});

  var h='<div class="wrap"><div class="sec"><div class="sec-hd"><span class="sec-title">📊 Resumo da disciplina</span></div><div class="sec-body">';
  h+='<div class="kgrid">';
  h+='<div class="kbox"><div class="kl">Escopo concluído</div><div class="kv">'+done+'/'+CHECKLIST.length+'</div></div>';
  h+='<div class="kbox w"><div class="kl">Em andamento</div><div class="kv">'+parc+'</div></div>';
  if(imp)h+='<div class="kbox d"><div class="kl">Impedidos</div><div class="kv">'+imp+'</div></div>';
  h+='<div class="kbox a"><div class="kl">Lançamentos</div><div class="kv">'+LANCS.length+'</div></div>';
  h+='</div>';
  h+='<div class="total-box"><span class="lb">Custo total apontado</span><span class="vl">'+fmt(totalCusto)+'</span></div>';
  h+='</div></div>';

  if(Object.keys(porCat).length){
    h+='<div class="sec"><div class="sec-hd"><span class="sec-title">Por categoria</span></div><div class="sec-body">';
    Object.keys(porCat).forEach(function(c){
      h+='<div class="lc"><div class="lc-info"><div class="lc-nome">'+esc(c)+'</div><div class="lc-meta">'+porCat[c].n+' lançamento'+(porCat[c].n>1?'s':'')+'</div></div><div class="lc-val">'+fmt(porCat[c].t)+'</div></div>';
    });
    h+='</div></div>';
  }
  h+='<div style="text-align:center;color:var(--mut);font-size:11.5px;padding:8px">A consolidação no financeiro do job é feita pelo escritório.</div>';
  h+='</div>';
  return h;
}

/* ═══════════ SALVAR CHECKLIST / OBS ═══════════ */
async function salvarChecklist(){
  try{
    var payload={checklist:CHECKLIST.map(function(c){return {nome:c.nome,status:c.status};})};
    var r=await fetch(SUPA_URL+'/rest/v1/apontamentos_producao?id=eq.'+APOINT.id,{method:'PATCH',headers:H,body:JSON.stringify(payload)});
    if(!r.ok)throw new Error('HTTP '+r.status);
    APOINT.checklist=payload.checklist;
    showSt('st-obs','✓ Checklist salvo!','ok');
  }catch(e){showSt('st-obs','✗ '+e.message,'err');}
}
async function salvarObs(){
  var obs=(document.getElementById('obs-geral')||{}).value||'';
  try{
    var r=await fetch(SUPA_URL+'/rest/v1/apontamentos_producao?id=eq.'+APOINT.id,{method:'PATCH',headers:H,body:JSON.stringify({observacao_geral:obs})});
    if(!r.ok)throw new Error('HTTP '+r.status);
    APOINT.observacao_geral=obs;
    showSt('st-obs','✓ Observação salva!','ok');
  }catch(e){showSt('st-obs','✗ '+e.message,'err');}
}

/* ═══════════ DELEGAÇÃO ═══════════ */
document.addEventListener('click',function(e){
  var el=e.target.closest('[data-action]')||e.target.closest('[data-v]')||e.target.closest('[data-ins]');
  if(!el)return;
  if(el.dataset.v){setView(el.dataset.v);return;}
  if(el.dataset.ins!=null){var drop=document.getElementById('ins-drop');if(drop&&drop._res)selecionarInsumo(drop._res[+el.dataset.ins]);return;}
  var a=el.dataset.action;
  if(a==='save-ck')salvarChecklist();
  else if(a==='save-obs')salvarObs();
  else if(a==='save-ins')salvarInsumo();
  else if(a==='foto-pick')document.getElementById('ins-file').click();
});
document.addEventListener('change',function(e){
  if(e.target.dataset&&e.target.dataset.ck!=null){CHECKLIST[+e.target.dataset.ck].status=e.target.value;render();}
  else if(e.target.id==='ins-cat'||e.target.id==='ins-tipo-mo')toggleMo();
  else if(e.target.id==='ins-file'&&e.target.files.length)lerFoto(e.target.files[0]);
});
document.addEventListener('input',function(e){
  if(e.target.id==='ins-busca')buscarInsumo(e.target.value);
  else if(e.target.id==='ins-qtd'||e.target.id==='ins-custo'||e.target.id==='ins-he')calcTotal();
});

init();
</script>
