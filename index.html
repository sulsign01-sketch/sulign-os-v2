<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SulSign OS v2 · Produção / OS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#1A1C22; --ink2:#2A2D36; --paper:#F5F4F0; --panel:#FFFFFF;
  --accent:#FF5A1F; --accent-soft:#FFEDE4;
  --ok:#1E9E5A; --ok-soft:#E3F5EB;
  --warn:#D97706; --warn-soft:#FCF0DC;
  --danger:#D23B2F; --danger-soft:#FBE7E4;
  --blue:#2563EB; --blue-soft:#E5EDFC;
  --line:#E4E2DC; --mut:#6B6E76;
  --radius:10px;
  --font-d:"Archivo",system-ui,sans-serif;
  --font-b:"Inter",system-ui,sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{font-family:var(--font-b);background:var(--paper);color:var(--ink);font-size:14px;line-height:1.5}
button{font-family:inherit;cursor:pointer}
input,select,textarea{font-family:inherit}
.app{display:flex;min-height:100vh}

/* ── Sidebar ── */
.side{width:224px;background:var(--ink);color:#C9CBD1;display:flex;flex-direction:column;position:sticky;top:0;height:100vh;flex-shrink:0}
.brand{padding:20px 18px 14px;border-bottom:1px solid #2E313A}
.brand h1{font-family:var(--font-d);font-weight:800;font-size:17px;letter-spacing:.3px;color:#fff}
.brand h1 span{color:var(--accent)}
.brand small{display:block;margin-top:3px;font-size:10.5px;color:#8B8E97;letter-spacing:.6px;text-transform:uppercase}
.nav{flex:1;overflow-y:auto;padding:10px 8px}
.nav-sec{font-size:10px;letter-spacing:1.2px;text-transform:uppercase;color:#70737C;padding:12px 12px 5px}
.nav button{display:flex;align-items:center;gap:10px;width:100%;text-align:left;background:none;border:none;color:#C9CBD1;padding:9px 12px;border-radius:8px;font-size:13.5px;font-weight:500}
.nav button:hover{background:var(--ink2);color:#fff}
.nav button.on{background:var(--accent);color:#fff;font-weight:600}
.nav button.off{opacity:.35;cursor:default}
.nav button.off:hover{background:none;color:#C9CBD1}
.nav .ic{width:20px;text-align:center;font-size:15px}
.nav .f1{margin-left:auto;font-size:9px;letter-spacing:.6px;background:#2E313A;color:#8B8E97;padding:1px 6px;border-radius:10px}
.side-foot{padding:12px 18px;border-top:1px solid #2E313A;font-size:11px;color:#8B8E97}
.v2-tag{display:inline-block;background:var(--accent);color:#fff;font-size:10px;font-weight:700;letter-spacing:.8px;padding:2px 8px;border-radius:20px;margin-bottom:6px}

/* ── Main ── */
.main{flex:1;min-width:0;display:flex;flex-direction:column}
.topbar{background:var(--panel);border-bottom:1px solid var(--line);padding:11px 24px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:20}
.topbar .tenant{font-family:var(--font-d);font-weight:700;font-size:15px}
.topbar .tenant em{font-style:normal;color:var(--mut);font-weight:500;font-size:12px;margin-left:8px}
.topbar .sp{flex:1}
.btn{border:none;border-radius:8px;padding:8px 16px;font-size:13px;font-weight:600}
.btn-p{background:var(--accent);color:#fff}
.btn-p:hover{background:#E64D14}
.btn-g{background:none;border:1px solid var(--line);color:var(--ink)}
.btn-g:hover{border-color:var(--mut)}
.btn-sm{padding:4px 10px;font-size:11.5px;border-radius:6px}
.content{padding:22px 24px 70px;max-width:1180px;width:100%}
.pg-head{margin-bottom:16px}
.pg-head h2{font-family:var(--font-d);font-weight:800;font-size:23px;letter-spacing:-.3px}
.pg-head p{color:var(--mut);margin-top:3px;max-width:680px;font-size:13px}
.crumb{font-size:12px;color:var(--mut);margin-bottom:10px}
.crumb a{color:var(--accent);cursor:pointer;text-decoration:none;font-weight:600}

/* ── Cards / KPIs ── */
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:18px}
.kpi{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:13px 15px}
.kpi .lb{font-size:10.5px;letter-spacing:.8px;text-transform:uppercase;color:var(--mut);font-weight:600}
.kpi .vl{font-family:var(--font-d);font-weight:800;font-size:24px;margin-top:3px;letter-spacing:-.4px}
.kpi .dt{font-size:11.5px;margin-top:2px;color:var(--mut)}
.kpi .dt.dn{color:var(--danger)} .kpi .dt.up{color:var(--ok)}
.kpi.alert{border-color:var(--danger);background:var(--danger-soft)}
.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:16px 18px;margin-bottom:14px}
.card h3{font-family:var(--font-d);font-weight:700;font-size:14.5px;margin-bottom:11px;display:flex;align-items:center;gap:8px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:900px){.grid2{grid-template-columns:1fr}}

/* ── Tables ── */
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;font-size:10.5px;letter-spacing:.8px;text-transform:uppercase;color:var(--mut);padding:7px 9px;border-bottom:1px solid var(--line);font-weight:600}
td{padding:8px 9px;border-bottom:1px solid #EFEEE9;vertical-align:middle}
tr:last-child td{border-bottom:none}
.click{cursor:pointer} tr.click:hover td{background:#FAF9F6}
td.num,th.num{text-align:right;font-variant-numeric:tabular-nums}
.mini{font-size:11.5px;color:var(--mut)}
.mono{font-variant-numeric:tabular-nums}

/* ── Tags ── */
.tag{display:inline-block;font-size:11px;font-weight:600;padding:2px 9px;border-radius:20px;white-space:nowrap}
.t-orc{background:var(--blue-soft);color:var(--blue)}
.t-prod{background:var(--accent-soft);color:var(--accent)}
.t-pago{background:var(--ok-soft);color:var(--ok)}
.t-warn{background:var(--warn-soft);color:var(--warn)}
.t-dang{background:var(--danger-soft);color:var(--danger)}
.t-mut{background:#EFEEE9;color:var(--mut)}
.t-ent{background:#EDEBFE;color:#6D28D9}

/* ── Barras de progresso ── */
.bar-wrap{background:#EFEEE9;border-radius:20px;height:8px;overflow:hidden;min-width:64px}
.bar{height:100%;border-radius:20px;background:var(--ok);transition:width .5s ease}
.bar.w{background:var(--warn)} .bar.d{background:var(--danger)}

/* ── Lifeline ── */
.lifeline{display:flex;align-items:flex-start;gap:0;overflow-x:auto;padding:6px 0 2px}
.ll-step{display:flex;flex-direction:column;align-items:center;min-width:88px;position:relative;background:none;border:none;color:var(--ink)}
.ll-step::before{content:"";position:absolute;top:13px;left:-50%;width:100%;height:2px;background:var(--line);z-index:0}
.ll-step:first-child::before{display:none}
.ll-step.done::before,.ll-step.now::before{background:var(--ok)}
.ll-dot{width:26px;height:26px;border-radius:50%;background:var(--panel);border:2px solid var(--line);z-index:1;display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--mut)}
.ll-step.done .ll-dot{background:var(--ok);border-color:var(--ok);color:#fff}
.ll-step.now .ll-dot{background:var(--accent);border-color:var(--accent);color:#fff;box-shadow:0 0 0 4px var(--accent-soft)}
.ll-lb{font-size:10.5px;margin-top:6px;color:var(--mut);text-align:center;max-width:86px;line-height:1.25}
.ll-step.now .ll-lb{color:var(--ink);font-weight:600}

/* ── Feed ── */
.live{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:700;letter-spacing:.8px;color:var(--accent)}
.live i{width:8px;height:8px;border-radius:50%;background:var(--accent);animation:pulseDot 1.6s infinite}
@keyframes pulseDot{0%,100%{opacity:1}50%{opacity:.3}}
.feed{list-style:none}
.feed li{display:flex;gap:11px;padding:8px 0;border-bottom:1px solid #EFEEE9;font-size:13px;align-items:flex-start}
.feed li:last-child{border:none}
.feed .fdot{width:9px;height:9px;border-radius:50%;margin-top:5px;flex-shrink:0;background:var(--ok)}
.feed .fdot.o{background:var(--accent)}
.feed .fdot.b{background:var(--blue)}
.feed time{margin-left:auto;color:var(--mut);font-size:11px;white-space:nowrap;padding-left:10px}

/* ── Fila (setores) ── */
.sec-hdr{display:flex;align-items:center;gap:10px;margin:18px 0 8px}
.sec-hdr h3{font-family:var(--font-d);font-weight:700;font-size:14px}
.sec-hdr .cnt{font-size:11px;font-weight:700;background:var(--ink);color:#fff;border-radius:20px;padding:1px 9px}

/* ── Form ── */
.fg{display:grid;gap:12px;margin-bottom:12px}
.fg2{grid-template-columns:1fr 1fr}
.fg3{grid-template-columns:1fr 1fr 1fr}
.fg4{grid-template-columns:repeat(4,1fr)}
@media(max-width:760px){.fg2,.fg3,.fg4{grid-template-columns:1fr 1fr}}
@media(max-width:480px){.fg2,.fg3,.fg4{grid-template-columns:1fr}}
.ff label{display:block;font-size:10.5px;letter-spacing:.6px;text-transform:uppercase;color:var(--mut);font-weight:600;margin-bottom:4px}
.fi{width:100%;border:1px solid var(--line);border-radius:8px;padding:8px 10px;font-size:13.5px;background:#fff}
.fi:focus{outline:none;border-color:var(--accent)}
textarea.fi{resize:vertical;min-height:64px}
.disc-pills{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:14px}
.disc-pills button{border:1px solid var(--line);background:#fff;border-radius:20px;padding:5px 13px;font-size:12px;font-weight:600;color:var(--mut)}
.disc-pills button.on{background:var(--ink);border-color:var(--ink);color:#fff}
.item-card{border:1px solid var(--line);border-radius:8px;padding:12px;margin-bottom:10px;background:#FCFBF8}
.item-hdr{display:flex;align-items:center;gap:8px;margin-bottom:9px}
.item-n{font-family:var(--font-d);font-weight:800;font-size:13px;color:var(--accent)}
.item-del{margin-left:auto;background:none;border:none;color:var(--danger);font-size:17px;line-height:1}
.gab-row{display:flex;gap:8px}
.gab-row button{flex:1;border:1px solid var(--line);background:#fff;border-radius:8px;padding:8px;font-size:13px;font-weight:600;color:var(--mut)}
.gab-row button.sel-s{background:var(--ok-soft);border-color:var(--ok);color:var(--ok)}
.gab-row button.sel-n{background:var(--danger-soft);border-color:var(--danger);color:var(--danger)}
.paste-zone{border:2px dashed var(--line);border-radius:8px;padding:14px;text-align:center;font-size:12px;color:var(--mut);cursor:pointer}
.paste-zone.has{border-style:solid;border-color:var(--ok)}
.paste-zone img{max-width:100%;max-height:180px;border-radius:6px;margin-top:8px}

/* ── Modais / toast / gate ── */
.modal{position:fixed;inset:0;background:rgba(26,28,34,.55);display:none;align-items:center;justify-content:center;z-index:100;padding:16px}
.modal.open{display:flex}
.modal-box{background:#fff;border-radius:12px;max-width:520px;width:100%;max-height:86vh;overflow-y:auto;padding:20px}
.modal-box h3{font-family:var(--font-d);font-weight:800;font-size:16px;margin-bottom:12px}
#toast-wrap{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);z-index:200;display:flex;flex-direction:column;gap:8px}
.toast{background:var(--ink);color:#fff;border-radius:8px;padding:10px 18px;font-size:13px;font-weight:600;box-shadow:0 6px 20px rgba(0,0,0,.25)}
.toast.ok{background:var(--ok)} .toast.err{background:var(--danger)}
#gate{position:fixed;inset:0;background:var(--ink);display:flex;align-items:center;justify-content:center;z-index:500;padding:16px}
.gate-box{background:#fff;border-radius:14px;padding:28px;max-width:360px;width:100%}
.gate-box h1{font-family:var(--font-d);font-weight:800;font-size:20px;margin-bottom:2px}
.gate-box h1 span{color:var(--accent)}
.gate-box p{font-size:12px;color:var(--mut);margin-bottom:18px}
.gate-err{color:var(--danger);font-size:12px;margin-top:10px;display:none}

/* ── Mobile ── */
@media(max-width:820px){
  .app{flex-direction:column}
  .side{width:100%;height:auto;position:static;flex-direction:column}
  .nav{display:flex;overflow-x:auto;padding:6px 8px}
  .nav-sec{display:none}
  .nav button{width:auto;white-space:nowrap;flex-shrink:0}
  .nav button.off{display:none}
  .nav .f1{display:none}
  .side-foot{display:none}
  .content{padding:16px 14px 70px}
  th,td{padding:7px 6px;font-size:12px}
  .hide-m{display:none}
}
</style>
</head>
<body>

<div class="app" id="app" style="display:none">

      <div class="nav-sec">Produção / OS</div>

  </aside>

  <div class="main">
    <div class="topbar">
      <span class="tenant">Sul Sign Group<em id="tb-sub">Produção / OS</em></span>
      <span class="sp"></span>
      <button class="btn btn-g btn-sm" data-action="reload">↻ Atualizar</button>

  </div>
</div>

<div class="modal" id="modal-tram"><div class="modal-box"><h3>Avançar etapa</h3><div id="tram-body"></div>
  <div style="display:flex;gap:10px;margin-top:16px;justify-content:flex-end">
    <button class="btn btn-g" data-action="tram-fechar">Cancelar</button>
    <button class="btn btn-p" data-action="tram-conf">Confirmar</button>
  </div></div></div>

<div class="modal" id="modal-hist"><div class="modal-box"><h3>Histórico da OS</h3><div id="hist-body"></div>
  <div style="display:flex;margin-top:16px;justify-content:flex-end">
    <button class="btn btn-g" data-action="hist-fechar">Fechar</button>
  </div></div></div>

<div id="toast-wrap"></div>

<script>
/* ═══════════ CONFIG ═══════════ */
var SU='https://obeamqkcuytctfczhook.supabase.co';
var SK='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9iZWFtcWtjdXl0Y3RmY3pob29rIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwMDIxOTQsImV4cCI6MjA4ODU3ODE5NH0.zk88W0HUIYkp8toTsJIXFHf6IGPRPs4hKz8kT3I5QVY';
var SESSION_KEY='ss_v2_session';

/* ═══════════ DISCIPLINAS (fluxos herdados da v1) ═══════════ */
var DISCS={
  ROUTER:{l:'Router CNC',steps:['Arte/Arquivo','Programação CNC','Produção','Acabamento/Pintura','Concluído']},
  LASER:{l:'Laser 150W',steps:['Arte/Arquivo','Programação CNC','Produção','Acabamento/Pintura','Concluído']},
  MARC:{l:'Marcenaria',steps:['Arte/Arquivo','Corte','Montagem','Acabamento/Pintura','Concluído']},
  SERR:{l:'Serralheria',steps:['Arte/Arquivo','Corte/Dobra','Solda/Montagem','Acabamento/Pintura','Concluído']},
  IMPRE:{l:'Impressão',steps:['Arte/Arquivo','Impressão','Acabamento','Concluído']},
  PLOTAGEM:{l:'Plotagem',steps:['Arte/Arquivo','Plotagem/Recorte','Acabamento','Concluído']},
  COMPRAS:{l:'Compras',steps:['Cotação','Aprovação','Pedido Feito','Recebido']},
  FORR:{l:'Forração',steps:['Arte/Arquivo','Corte de Material','Forração','Acabamento','Concluído']},
  PINT:{l:'Pintura',steps:['Preparação','Aplicação Primer','Pintura','Acabamento/Verniz','Concluído']},
  APLIC:{l:'Aplicação',steps:['Arte/Arquivo','Preparação Superfície','Aplicação','Concluído']},
  ESTR:{l:'Estruturas',steps:['Projeto/Cálculo','Corte/Montagem','Solda/Fixação','Acabamento','Concluído']},
  DETA:{l:'Detalhamento',steps:['Arte/Arquivo','Detalhamento','Acabamento','Concluído']},
  CV:{l:'CV/Impressão',steps:['Arte/Arquivo','Impressão','Laminação/Acabamento','Concluído']},
  IMP3D:{l:'Impressão 3D',steps:['Arquivo 3D','Fatiamento','Impressão','Pós-Processamento','Concluído']},
  ELET:{l:'Elétrica',steps:['Projeto Elétrico','Material','Instalação','Teste/Comissionamento','Concluído']},
  ARTPL:{l:'Artes Plásticas',steps:['Conceito','Modelagem/Escultura','Acabamento','Concluído']},
  ARQ:{l:'Arquitetura',steps:['Briefing','Projeto','Detalhamento Técnico','Aprovação','Concluído']},
  DESIGN:{l:'Design',steps:['Briefing','Conceito/Rascunho','Arte Final','Aprovação Cliente','Concluído']}
};
var RESP=['Fernando Jovita','Everson','Edson','Carlos'];
var LOG=['Cliente Retira','Entrega (frete por conta do cliente)','Entrega inclusa','Montagem inclusa','A combinar'];
var ETAPAS_OBS_OBRIG=['Concluído','Acabamento/Pintura','Acabamento'];
var FINAIS=['Concluído','Recebido'];

/* ═══════════ ESTADO ═══════════ */
var osList=[], histRecente=[], orcAtivos=[];
var view='painel', viewArg=null;
var osEd=null, formDisc='ROUTER', printBase64='';
var tramId=null, tramSt=null;

/* ═══════════ AUTH ═══════════ */
function getStoredSession(){
  try{ var s=JSON.parse(localStorage.getItem(SESSION_KEY)||localStorage.getItem('sulsign_session')||'null'); return s; }catch(e){ return null; }
}
function storeSession(s){ localStorage.setItem(SESSION_KEY,JSON.stringify(s)); }
function clearSession(){ localStorage.removeItem(SESSION_KEY); }
function getAuthToken(){ var s=getStoredSession(); return (s&&s.access_token)?s.access_token:SK; }
function hdr(){ return {'apikey':SK,'Authorization':'Bearer '+getAuthToken(),'Content-Type':'application/json'}; }

async function tentarLogin(){
  var email=document.getElementById('g-email').value.trim();
  var senha=document.getElementById('g-senha').value;
  var btn=document.getElementById('g-btn');
  var err=document.getElementById('g-err');
  if(!email||!senha){err.textContent='Preencha e-mail e senha.';err.style.display='block';return;}
  btn.disabled=true; btn.textContent='Entrando…'; err.style.display='none';
  try{
    var r=await fetch(SU+'/auth/v1/token?grant_type=password',{method:'POST',headers:{'apikey':SK,'Content-Type':'application/json'},body:JSON.stringify({email:email,password:senha})});
    var data=await r.json();
    if(!r.ok||!data.access_token){err.textContent='E-mail ou senha incorretos.';err.style.display='block';btn.disabled=false;btn.textContent='Entrar';return;}
    storeSession({access_token:data.access_token,refresh_token:data.refresh_token,expires_at:Date.now()+((data.expires_in||3600)*1000),email:email});
    entrar();
  }catch(e){err.textContent='Erro de conexão: '+e.message;err.style.display='block';btn.disabled=false;btn.textContent='Entrar';}
}
async function verificarSessao(){
  var s=getStoredSession();
  if(!s||!s.access_token){return false;}
  if(s.expires_at&&Date.now()<s.expires_at-60000){return true;}
  if(s.refresh_token){
    try{

    }catch(e){}

/* ═══════════ UTILS ═══════════ */
function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fmt(d){ return d?new Date(d+'T12:00:00').toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'}):'—'; }
function fmtFull(d){ return d?new Date(d+'T12:00:00').toLocaleDateString('pt-BR'):'—'; }
function hoje(){ return new Date().toISOString().split('T')[0]; }
function tempoRel(iso){
  if(!iso)return '';
  var diff=Date.now()-new Date(iso).getTime();
  var m=Math.floor(diff/60000);
  if(m<1)return 'agora';
  if(m<60)return 'há '+m+' min';
  var h=Math.floor(m/60);
  if(h<24)return 'há '+h+'h';
  var d=Math.floor(h/24);
  return 'há '+d+'d';
}
function stepsDe(os){ var d=DISCS[os.disciplina]; return d?d.steps:['Início','Produção','Concluído']; }
function progDe(os){
  var st=stepsDe(os); var i=st.indexOf(os.status);
  if(i<0)return 0;
  return Math.round(i/(st.length-1)*100);
}
function proxEtapa(os){
  var st=stepsDe(os); var i=st.indexOf(os.status);
  if(i<0||i>=st.length-1)return null;
  return st[i+1];
}
function concluida(os){ return FINAIS.indexOf(os.status)>=0; }
function atrasada(os){
  if(concluida(os))return false;
  var ref=os.data_entrega_prometida||os.prazo;
  return !!ref&&ref<hoje();
}
function tagStatus(os){
  if(concluida(os))return '<span class="tag t-pago">'+esc(os.status)+'</span>';
  if(atrasada(os))return '<span class="tag t-dang">'+esc(os.status)+'</span>';
  var st=stepsDe(os); var i=st.indexOf(os.status);
  if(i<=0)return '<span class="tag t-orc">'+esc(os.status)+'</span>';
  return '<span class="tag t-prod">'+esc(os.status)+'</span>';
}
function barCls(os){
  if(atrasada(os))return ' d';
  if(progDe(os)<40&&!concluida(os))return ' w';
  return '';
}
function jobKey(os){
  if(os.orcamento_numero)return os.orcamento_numero;
  var m=String(os.num||'').match(/^(SS-\d{4}_\d{2}-\d+)/);
  return m?m[1]:'(sem job)';
}
function gerarNum(disc,orcNum){
  var base=orcNum||'SS-'+new Date().getFullYear()+'_'+String(new Date().getMonth()+1).padStart(2,'0')+'-00';
  var n=osList.filter(function(o){return o.orcamento_numero===orcNum&&o.disciplina===disc;}).length+1;
  return base+'-'+disc+'-'+String(n).padStart(3,'0');
}
function toast(msg,tp){
  var el=document.createElement('div');
  el.className='toast '+(tp||'');
  el.textContent=msg;
  document.getElementById('toast-wrap').appendChild(el);
  setTimeout(function(){if(el.parentNode)el.parentNode.removeChild(el);},3200);
}

/* ═══════════ VIEW: JOBS + LINHA DE VIDA ═══════════ */
var ETAPAS_JOB=['OS abertas','Em produção','Acabamento','Concluído'];
function etapaJob(arr){
  var todosConc=arr.every(concluida);
  if(todosConc)return 3;
  var algumAcab=arr.some(function(o){
    var st=stepsDe(o); var i=st.indexOf(o.status);
    return i>=st.length-2&&!concluida(o);
  });
  if(algumAcab)return 2;
  var algumProd=arr.some(function(o){
    var st=stepsDe(o); return st.indexOf(o.status)>0;
  });
  if(algumProd)return 1;
  return 0;
}
function lifelineJob(et){
  var h='<div class="lifeline">';
  for(var i=0;i<ETAPAS_JOB.length;i++){
    var cls=i<et?'done':(i===et?'now':'');
    h+='<span class="ll-step '+cls+'"><span class="ll-dot">'+(i<et?'✓':(i+1))+'</span><span class="ll-lb">'+ETAPAS_JOB[i]+'</span></span>';
  }
  return h+'</div>';
}

function coletarItens(){
  var its=[];
  var prev=(osEd&&osEd.itens)?osEd.itens:[];
  document.querySelectorAll('#f-itens .item-card').forEach(function(c,idx){
    var it={};
    c.querySelectorAll('[data-if]').forEach(function(inp){it[inp.dataset.if]=inp.value;});
    if(prev[idx]&&prev[idx].foto_base64)it.foto_base64=prev[idx].foto_base64;
    if(it.desc||it.qtd||it.verba||it.target||it.fechado)its.push(it);
  });
  return its;
}
async function salvar(){
  var cli=(document.getElementById('f-cli')||{}).value||'';
  if(!cli.trim()){toast('Informe o cliente.','err');return;}
  var disc=osEd?osEd.disciplina:formDisc;
  var orcNum=(document.getElementById('f-orc')||{}).value||'';
  var num=osEd?osEd.num:gerarNum(disc,orcNum.trim());
  var payload={
    num:num,orcamento_numero:orcNum.trim()||null,disciplina:disc,
    cliente:cli,
    projeto:(document.getElementById('f-proj')||{}).value||'',
    responsavel:(document.getElementById('f-resp')||{}).value||'',
    operador:(document.getElementById('f-op')||{}).value||'',
    prazo:(document.getElementById('f-prazo')||{}).value||null,
    data_entrega_prometida:(document.getElementById('f-entrega')||{}).value||null,
    data_entrada:(document.getElementById('f-ent')||{}).value||hoje(),
    dimensoes:(document.getElementById('f-dim')||{}).value||'',
    logistica:(document.getElementById('f-log')||{}).value||'',
    acabamento:(document.getElementById('f-acab')||{}).value||'',
    acabamento_cor:(document.getElementById('f-acor')||{}).value||'',
    gabarito:(document.getElementById('f-gab')||{}).value||'sim',
    link_arquivo:(document.getElementById('f-link')||{}).value||'',
    observacoes:(document.getElementById('f-obs')||{}).value||'',
    itens:coletarItens(),
    print_base64:printBase64||(osEd?osEd.print_base64:null)||null,
    status:osEd?osEd.status:(disc==='COMPRAS'?'Cotação':'Arte/Arquivo'),
    updated_at:new Date().toISOString()
  };
  var btn=document.getElementById('btn-salvar');
  if(btn)btn.textContent='⏳ Salvando…';
  try{
    if(osEd){await sbPatch('ordens_servico',osEd.id,payload);toast('OS atualizada!','ok');}
    else{await sbPost('ordens_servico',payload);toast('OS '+num+' criada!','ok');}
    osEd=null;printBase64='';
    await load();go('lista');
  }catch(e){toast('Erro: '+e.message,'err');if(btn)btn.textContent='💾 Salvar OS';}
}
function lerImg(file){
  if(!file||file.type.indexOf('image')!==0)return;
  var rd=new FileReader();
  rd.onload=function(ev){
    printBase64=ev.target.result;
    var z=document.getElementById('paste-zone');
    if(z){z.className='paste-zone has';z.innerHTML='<img src="'+printBase64+'">';}
  };
  rd.readAsDataURL(file);
}

function abrirTram(osId,novoSt){
  tramId=osId;tramSt=novoSt;
  var os=osList.find(function(o){return o.id===osId;});
  var obsObrig=ETAPAS_OBS_OBRIG.indexOf(novoSt)>=0;
  var b=document.getElementById('tram-body');
  var h='<p class="mini" style="margin-bottom:12px">Avançar <b>'+esc(os?os.num:'')+'</b> para <b>'+esc(novoSt)+'</b></p>';
  h+='<div class="fg fg2"><div class="ff"><label>Responsável</label><select class="fi" id="tr-resp"><option value="">— selecionar —</option>';
  RESP.forEach(function(r){h+='<option>'+esc(r)+'</option>';});
  h+='</select></div></div>';
  h+='<div class="ff"><label>Observação'+(obsObrig?' (obrigatória)':'')+'</label><textarea class="fi" id="tr-obs" placeholder="'+(obsObrig?'Descreva o que foi realizado…':'Opcional')+'"></textarea></div>';
  b.innerHTML=h;
  document.getElementById('modal-tram').classList.add('open');
}
async function confirmarTram(){
  if(!tramId)return;
  var os=osList.find(function(o){return o.id===tramId;});
  var resp=(document.getElementById('tr-resp')||{}).value||'';
  var obs=(document.getElementById('tr-obs')||{}).value||'';
  if(ETAPAS_OBS_OBRIG.indexOf(tramSt)>=0&&!obs.trim()){
    toast('Esta etapa exige observação obrigatória.','err');
    document.getElementById('tr-obs').focus();
    return;
  }
  try{
    await sbPatch('ordens_servico',tramId,{status:tramSt,updated_at:new Date().toISOString()});
    await sbPost('os_historico',{os_id:tramId,status_anterior:os?os.status:'',status_novo:tramSt,responsavel:resp,observacao:obs||null});
    toast('Avançado para: '+tramSt,'ok');
    fecharTram();
    await load();
  }catch(e){toast('Erro: '+e.message,'err');}
}
function fecharTram(){
  document.getElementById('modal-tram').classList.remove('open');
  tramId=null;tramSt=null;
}

async function verHist(id){

  var b=document.getElementById('hist-body');
  b.innerHTML='<p class="mini">Carregando…</p>';
  document.getElementById('modal-hist').classList.add('open');
  try{
    var hist=await sbGet('os_historico?os_id=eq.'+id+'&order=created_at.desc');
    var h='<p class="mini" style="margin-bottom:10px"><b>'+esc(os?os.num:'')+'</b>'+(os?' — '+esc(os.cliente||''):'')+'</p>';
    if(!hist.length)h+='<p class="mini">Nenhuma movimentação.</p>';
    else{
      h+='<ul class="feed">';
      hist.forEach(function(ev){
        h+='<li><span class="fdot'+(ev.status_novo==='Concluído'?'':' o')+'"></span><span>'+esc(ev.status_anterior||'—')+' → <b>'+esc(ev.status_novo||'—')+'</b>';
        if(ev.responsavel)h+='<span class="mini"> · '+esc(ev.responsavel)+'</span>';
        if(ev.observacao)h+='<div class="mini">'+esc(ev.observacao)+'</div>';
        h+='</span><time>'+(ev.created_at?new Date(ev.created_at).toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'})+' '+new Date(ev.created_at).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}):'')+'</time></li>';
      });
      h+='</ul>';
    }
    b.innerHTML=h;
  }catch(e){b.innerHTML='<p class="mini" style="color:var(--danger)">Erro: '+esc(e.message)+'</p>';}
}

/* ═══════════ AÇÕES / DELEGAÇÃO ═══════════ */
document.addEventListener('click',function(e){
  var el=e.target.closest('[data-action]');
  if(!el)return;
  var a=el.dataset.action;
  if(a==='login'){tentarLogin();}
  else if(a==='logout'){e.preventDefault();sair();}
  else if(a==='go'){go(el.dataset.view);}
  else if(a==='reload'){load();toast('Atualizado.','ok');}
  else if(a==='nova'){osEd=null;printBase64='';view='form';render();window.scrollTo(0,0);}
  else if(a==='editar'){
    if(e.target.closest('button')&&e.target.closest('button')!==el)return;
    var os=osList.find(function(o){return String(o.id)===String(el.dataset.id);});
    if(os){osEd=os;printBase64='';formDisc=os.disciplina;view='form';render();window.scrollTo(0,0);}
  }
  else if(a==='job'){
    view='job';viewArg=el.dataset.key;
    document.querySelectorAll('#nav button[data-view]').forEach(function(b){b.className=(b.dataset.view==='jobs')?'on':'';});
    render();window.scrollTo(0,0);
  }
  else if(a==='disc'){formDisc=el.dataset.k;render();}
  else if(a==='gab'){
    document.getElementById('f-gab').value=el.dataset.v;
    document.querySelectorAll('[data-action="gab"]').forEach(function(b){
      b.className=(b.dataset.v===el.dataset.v)?(el.dataset.v==='sim'?'sel-s':'sel-n'):'';
    });
  }
  else if(a==='add-item'){
    var wrap=document.getElementById('f-itens');
    var n=wrap.querySelectorAll('.item-card').length;
    var d=document.createElement('div');
    d.innerHTML=itemRow({},n);
    wrap.appendChild(d.firstChild);
  }
  else if(a==='del-item'){
    var card=el.closest('.item-card');
    if(card)card.parentNode.removeChild(card);
  }
  else if(a==='paste-pick'){document.getElementById('f-file').click();}
  else if(a==='salvar'){salvar();}
  else if(a==='del'){
    if(confirm('Excluir esta OS? (soft delete — fica na trilha de auditoria)')){
      sbDel('ordens_servico',el.dataset.id).then(function(){
        toast('OS excluída.','ok');osEd=null;load();go('lista');
      }).catch(function(err){toast('Erro: '+err.message,'err');});
    }
  }
  else if(a==='tram'){e.stopPropagation();abrirTram(el.dataset.id,el.dataset.st);}
  else if(a==='print'){e.stopPropagation();printOS(el.dataset.id);}
  else if(a==='tram-conf'){confirmarTram();}
  else if(a==='tram-fechar'){fecharTram();}
  else if(a==='hist'){e.stopPropagation();verHist(el.dataset.id);}
  else if(a==='hist-fechar'){document.getElementById('modal-hist').classList.remove('open');}
});
document.addEventListener('input',function(e){
  var el=e.target;
  if(el.dataset.actionInput==='busca'){buscaTxt=el.value;
    /* re-render preservando foco */
    var pos=el.selectionStart;
    render();
    var b=document.getElementById('busca');
    if(b){b.focus();b.setSelectionRange(pos,pos);}
  }
  else if(el.dataset.actionInput==='orcnum'&&!osEd){
    var numEl=document.getElementById('f-num');
    if(numEl)numEl.value=gerarNum(formDisc,el.value.trim());
  }
});
document.addEventListener('paste',function(e){
  if(view!=='form')return;
  var items=(e.clipboardData||{}).items||[];
  for(var i=0;i<items.length;i++){
    if(items[i].type.indexOf('image')===0){lerImg(items[i].getAsFile());e.preventDefault();return;}
  }
});
document.addEventListener('change',function(e){
  if(e.target.id==='f-file'&&e.target.files.length)lerImg(e.target.files[0]);
});
document.addEventListener('keydown',function(e){
  if(e.key==='Enter'&&document.getElementById('gate').style.display!=='none'){
    if(e.target.id==='g-email'||e.target.id==='g-senha')tentarLogin();
  }
});

/* ═══════════ INIT ═══════════ */
(async function(){
  var ok=await verificarSessao();
  if(ok)entrar();
})();
</script>
</body>
